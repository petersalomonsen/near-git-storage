<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Repository - NEAR Git Storage</title>
    <style>
        body { font-family: monospace; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 0.25rem; }
        h1 + p { color: #666; margin-top: 0; }
        #status { margin: 0.5rem 0; padding: 0.5rem; background: #f6f8fa; border-radius: 4px; font-size: 0.85rem; }
        #wallet-section { margin: 1rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 6px; }
        #create-section { margin: 1rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 6px; display: none; }
        #create-section label { display: block; margin-bottom: 0.25rem; font-weight: bold; }
        #repo-name { width: 100%; box-sizing: border-box; padding: 0.4rem; font-family: monospace; margin-bottom: 0.5rem; }
        button { padding: 0.4rem 1.2rem; font-family: monospace; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #result { margin-top: 1rem; padding: 1rem; border: 1px solid #4caf50; border-radius: 6px; background: #f0fff0; display: none; }
        #wallet-info { font-size: 0.85rem; color: #333; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <h1>NEAR Git Storage</h1>
    <p>Create a new git repository on NEAR</p>

    <div id="status">Loading...</div>

    <div id="wallet-section">
        <button id="connect-btn">Connect Wallet</button>
        <button id="disconnect-btn" style="display:none">Disconnect</button>
        <div id="wallet-info"></div>
    </div>

    <div id="create-section">
        <label for="repo-name">Repository name</label>
        <input type="text" id="repo-name" placeholder="my-project">
        <button id="create-btn">Create Repository</button>
    </div>

    <div id="result">
        <strong>Repository created!</strong>
        <p id="result-details"></p>
    </div>

    <script type="module">
        const statusEl = document.getElementById('status');
        const connectBtn = document.getElementById('connect-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const walletInfo = document.getElementById('wallet-info');
        const createSection = document.getElementById('create-section');
        const createBtn = document.getElementById('create-btn');
        const repoNameEl = document.getElementById('repo-name');
        const resultEl = document.getElementById('result');
        const resultDetails = document.getElementById('result-details');

        // Derive factory contract ID from hostname:
        // gitfactory.testnet.page -> gitfactory.testnet
        // gitfactory.near.page -> gitfactory.near
        const host = location.hostname;
        const factoryId = host.replace(/\.page$/, '');
        document.querySelector('h1 + p').textContent =
            `Create a new git repository on ${factoryId}`;

        // Derive network from the factory ID
        const network = factoryId.endsWith('.testnet') ? 'testnet' : 'mainnet';

        let connector, wallet, accountId;
        let signAndSendTransaction;

        function setStatus(msg) { statusEl.textContent = msg; }

        function onConnected(id) {
            accountId = id;
            connectBtn.style.display = 'none';
            disconnectBtn.style.display = '';
            walletInfo.textContent = `Connected as: ${accountId}`;
            createSection.style.display = 'block';
            setStatus('Ready to create a repository.');
        }

        function onDisconnected() {
            accountId = null;
            connectBtn.style.display = '';
            disconnectBtn.style.display = 'none';
            walletInfo.textContent = '';
            createSection.style.display = 'none';
            resultEl.style.display = 'none';
            setStatus('Connect your wallet to create a repository.');
        }

        async function init() {
            const { NearConnector } = await import('https://cdn.jsdelivr.net/npm/@hot-labs/near-connect@0.11.1/+esm');
            connector = new NearConnector({ network });

            connector.on('wallet:signIn', async (event) => {
                const accounts = event.accounts || [];
                if (accounts.length > 0) {
                    wallet = event.wallet || await connector.wallet();
                    signAndSendTransaction = (p) => wallet.signAndSendTransaction(p);
                    onConnected(accounts[0].accountId);
                }
            });

            connector.on('wallet:signOut', () => onDisconnected());

            connectBtn.addEventListener('click', async () => {
                setStatus('Connecting wallet...');
                try { await connector.connect(); }
                catch (err) { setStatus('Error: ' + err.message); }
            });

            disconnectBtn.addEventListener('click', async () => {
                try { await connector.disconnect(); onDisconnected(); }
                catch (err) { setStatus('Error: ' + err.message); }
            });

            setStatus('Connect your wallet to create a repository.');
        }

        createBtn.addEventListener('click', async () => {
            const repoName = repoNameEl.value.trim();
            if (!repoName) { setStatus('Please enter a repository name.'); return; }

            createBtn.disabled = true;
            setStatus('Creating repository...');

            try {
                await signAndSendTransaction({
                    receiverId: factoryId,
                    actions: [{
                        type: 'FunctionCall',
                        params: {
                            methodName: 'create_repo',
                            args: { repo_name: repoName },
                            gas: '300000000000000',
                            deposit: '1000000000000000000000000',
                        },
                    }],
                });

                const repoAccountId = `${repoName}.${factoryId}`;
                resultDetails.textContent = `Account: ${repoAccountId}`;
                resultEl.style.display = 'block';
                setStatus('Repository created successfully!');
            } catch (err) {
                setStatus('Error: ' + err.message);
            } finally {
                createBtn.disabled = false;
            }
        });

        init().catch(err => setStatus('Init error: ' + err.message));
    </script>
</body>
</html>
