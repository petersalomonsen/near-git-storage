<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEAR Git Blog - Testnet</title>
    <style>
        body { font-family: monospace; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 0.25rem; }
        h1 + p { color: #666; margin-top: 0; }
        #config { margin: 1rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 6px; background: #fafafa; }
        #config label { display: block; margin-bottom: 0.25rem; font-weight: bold; font-size: 0.85rem; }
        #config input { font-family: monospace; width: 100%; padding: 0.3rem; box-sizing: border-box; margin-bottom: 0.5rem; }
        #config button { font-family: monospace; padding: 0.4rem 1rem; cursor: pointer; }
        #status { margin: 0.5rem 0; padding: 0.5rem; background: #f6f8fa; border-radius: 4px; font-size: 0.85rem; }
        #compose { margin: 1rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 6px; display: none; }
        #compose label { display: block; margin-bottom: 0.25rem; font-weight: bold; }
        #blog-title { width: 100%; box-sizing: border-box; padding: 0.4rem; font-family: monospace; margin-bottom: 0.5rem; }
        #blog-body { width: 100%; box-sizing: border-box; padding: 0.4rem; font-family: monospace; height: 6rem; margin-bottom: 0.5rem; }
        #publish { padding: 0.4rem 1.2rem; font-family: monospace; cursor: pointer; }
        #publish:disabled { opacity: 0.5; cursor: not-allowed; }
        #posts { margin-top: 1rem; }
        #posts article { border-top: 1px solid #eee; padding: 0.75rem 0; }
        #posts article h2 { margin: 0 0 0.25rem 0; font-size: 1.1rem; }
        #posts article p { margin: 0.25rem 0; }
        #posts article .meta { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <h1>NEAR Git Blog</h1>
    <p>wasm-git &rarr; service worker &rarr; NEAR testnet</p>

    <div id="config">
        <label>Contract ID <input id="contractId" value="wasmgitdemo1.testnet"></label>
        <label>Account ID (signer) <input id="accountId" placeholder="yourname.testnet"></label>
        <label>Private key <input id="privateKey" type="password" placeholder="ed25519:..."></label>
        <label>RPC URL <input id="rpcUrl" value="https://archival-rpc.testnet.fastnear.com"></label>
        <button id="connect">Connect</button>
    </div>

    <div id="status"></div>

    <div id="compose">
        <label for="blog-title">Title</label>
        <input type="text" id="blog-title" placeholder="Post title">
        <label for="blog-body">Body</label>
        <textarea id="blog-body" placeholder="Write your post..."></textarea>
        <button id="publish" disabled>Publish</button>
    </div>

    <div id="posts"></div>

    <script type="module">
        const statusEl = document.getElementById('status');
        const postsEl = document.getElementById('posts');
        const configEl = document.getElementById('config');
        const composeEl = document.getElementById('compose');
        const titleEl = document.getElementById('blog-title');
        const bodyEl = document.getElementById('blog-body');
        const publishBtn = document.getElementById('publish');
        const connectBtn = document.getElementById('connect');

        function setStatus(msg) { statusEl.textContent = msg; }

        let resolveNext;
        let send;
        const next = () => new Promise(resolve => { resolveNext = resolve; });

        // Restore saved config
        const saved = localStorage.getItem('near-git-config');
        if (saved) {
            try {
                const c = JSON.parse(saved);
                if (c.accountId) document.getElementById('accountId').value = c.accountId;
                if (c.rpcUrl) document.getElementById('rpcUrl').value = c.rpcUrl;
                if (c.contractId) document.getElementById('contractId').value = c.contractId;
            } catch (e) {}
        }

        connectBtn.addEventListener('click', () => {
            connectBtn.disabled = true;
            setStatus('');
            // Save non-secret config
            localStorage.setItem('near-git-config', JSON.stringify({
                contractId: document.getElementById('contractId').value,
                accountId: document.getElementById('accountId').value,
                rpcUrl: document.getElementById('rpcUrl').value,
            }));
            main().catch(err => {
                console.error(err);
                setStatus('Error: ' + err.message);
                connectBtn.disabled = false;
            });
        });

        publishBtn.addEventListener('click', publish);

        async function main() {
            const contractId = document.getElementById('contractId').value.trim();
            const accountId = document.getElementById('accountId').value.trim();
            const rawPrivateKey = document.getElementById('privateKey').value.trim();
            const rpcUrl = document.getElementById('rpcUrl').value.trim();

            if (!contractId || !accountId || !rawPrivateKey) {
                throw new Error('Please fill in contract ID, account ID, and private key');
            }

            const privateKey = rawPrivateKey.replace('ed25519:', '');

            setStatus('Deriving public key...');
            const keyBytes = base58Decode(privateKey);
            let publicKey;
            if (keyBytes.length === 64) {
                publicKey = base58Encode(keyBytes.slice(32));
            } else if (keyBytes.length === 32) {
                throw new Error('32-byte key detected. Please use the full 64-byte keypair from ~/.near-credentials.');
            } else {
                throw new Error('Unexpected key length: ' + keyBytes.length);
            }

            setStatus('Registering service worker...');
            await navigator.serviceWorker.register('/near-git-sw.js', { type: 'module' });
            await navigator.serviceWorker.ready;
            if (!navigator.serviceWorker.controller) {
                await new Promise(resolve => {
                    navigator.serviceWorker.addEventListener('controllerchange', resolve, { once: true });
                });
            }

            navigator.serviceWorker.controller.postMessage({
                type: 'configure',
                rpcUrl,
                contractId,
                accountId,
                publicKey,
                privateKey,
            });

            const repoUrl = `${location.origin}/near-repo/repo.git`;

            await clearOPFS('repo.git');
            const worker = new Worker(new URL('worker.js', import.meta.url), { type: 'module' });
            worker.onmessage = (msg) => resolveNext?.(msg.data);
            send = (command, params = {}) => {
                worker.postMessage({ command, ...params });
                return next();
            };
            await next();

            setStatus('Cloning from ' + contractId + '...');
            const cloneResult = await send('clone', { url: repoUrl });
            if (cloneResult.error) throw new Error('Clone failed: ' + cloneResult.error);

            configEl.style.display = 'none';
            composeEl.style.display = 'block';

            setStatus('Loading posts...');
            await loadPosts();
            publishBtn.disabled = false;
            setStatus('Ready — connected to ' + contractId);
        }

        function renderMarkdown(md) {
            const lines = md.split('\n');
            let title = '';
            const bodyLines = [];
            let pastTitle = false;
            for (const line of lines) {
                if (!pastTitle && line.startsWith('# ')) {
                    title = line.slice(2).trim();
                    pastTitle = true;
                } else if (pastTitle) {
                    bodyLines.push(line);
                }
            }
            const body = bodyLines.join('\n').trim();
            const paragraphs = body.split(/\n\n+/).filter(Boolean);
            return { title, paragraphs };
        }

        async function loadPosts() {
            const listResult = await send('listfiles');
            if (listResult.error) {
                postsEl.innerHTML = '<p>No posts yet.</p>';
                return;
            }
            const files = (listResult.files || []).sort().reverse().slice(0, 10);
            if (files.length === 0) {
                postsEl.innerHTML = '<p>No posts yet.</p>';
                return;
            }
            let html = '';
            for (const filename of files) {
                const result = await send('readfile', { filename });
                const content = result.filecontents || '';
                const { title, paragraphs } = renderMarkdown(content);
                const timestamp = filename.replace('.md', '');
                html += `<article>
                    <h2>${escapeHtml(title)}</h2>
                    ${paragraphs.map(p => `<p>${escapeHtml(p)}</p>`).join('')}
                    <div class="meta">${escapeHtml(timestamp)}</div>
                </article>`;
            }
            postsEl.innerHTML = html;
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function publish() {
            const title = titleEl.value.trim();
            const body = bodyEl.value.trim();
            if (!title || !body) return;
            publishBtn.disabled = true;
            setStatus('Publishing...');
            try {
                const timestamp = new Date().toISOString().replace(/[:.]/g, m => m === ':' ? ':' : '.');
                const filename = `${timestamp}.md`;
                const contents = `# ${title}\n\n${body}`;
                const result = await send('writecommitandpush', { filename, contents });
                if (result.error) throw new Error(result.error);
                titleEl.value = '';
                bodyEl.value = '';
                setStatus('Published! Refreshing...');
                await loadPosts();
                setStatus('Ready');
            } catch (err) {
                setStatus('Error: ' + err.message);
            } finally {
                publishBtn.disabled = false;
            }
        }

        async function clearOPFS(repoName) {
            try {
                const root = await navigator.storage.getDirectory();
                await root.removeEntry(repoName, { recursive: true });
            } catch (e) {}
        }

        const BASE58_ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';

        function base58Decode(str) {
            const bytes = [];
            for (const c of str) {
                let carry = BASE58_ALPHABET.indexOf(c);
                if (carry < 0) throw new Error('Invalid base58 character: ' + c);
                for (let j = 0; j < bytes.length; j++) {
                    carry += bytes[j] * 58;
                    bytes[j] = carry & 0xff;
                    carry >>= 8;
                }
                while (carry > 0) {
                    bytes.push(carry & 0xff);
                    carry >>= 8;
                }
            }
            for (const c of str) {
                if (c !== '1') break;
                bytes.push(0);
            }
            return new Uint8Array(bytes.reverse());
        }

        function base58Encode(bytes) {
            const digits = [0];
            for (const byte of bytes) {
                let carry = byte;
                for (let j = 0; j < digits.length; j++) {
                    carry += digits[j] << 8;
                    digits[j] = carry % 58;
                    carry = (carry / 58) | 0;
                }
                while (carry > 0) {
                    digits.push(carry % 58);
                    carry = (carry / 58) | 0;
                }
            }
            let result = '';
            for (const b of bytes) {
                if (b !== 0) break;
                result += '1';
            }
            for (let i = digits.length - 1; i >= 0; i--) {
                result += BASE58_ALPHABET[digits[i]];
            }
            return result;
        }
    </script>
</body>
</html>
